name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js (for static site)
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Create docs folder for GitHub Pages
      run: |
        mkdir -p docs
        cp index.html docs/index.html
        cp ping.py docs/
        cp server.py docs/
        cp requirements.txt docs/
        cp README.md docs/
        cp CLOUDFLARE_TUNNEL.md docs/
        cp GITHUB_PAGES_SETUP.md docs/
        cp DEPLOYMENT_COMPLETE.md docs/

    - name: Create CNAME for custom domain
      run: echo "audioquackchecker.webap.cl" > docs/CNAME
        
    - name: Setup Pages
      uses: actions/configure-pages@v5
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'docs'
        
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
      
    - name: Print deployment info
      run: |
        echo "✓ Deployed to GitHub Pages!"
        echo "URL: https://audioquackchecker.webap.cl/"
        echo ""
        echo "Next steps:"
        echo "1. Go to repository Settings → Pages"
        echo "2. Select 'Deploy from a branch'"
        echo "3. Set branch to 'gh-pages' and folder to '/ (root)'"
        echo "4. Configure DNS at your domain registrar"
        echo "5. Point CNAME to: luisdiko14-lab.github.io"
